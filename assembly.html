    myInfo = await checkPageAccess('assembly.html');
    if (!myInfo) return;
  }
  if (typeof applyI18N === 'function') applyI18N();
  if (typeof createLangSelector === 'function') createLangSelector('langSelector');

  document.getElementById('userInfo').textContent = myInfo ? `${myInfo.name} (${myInfo.emp_code})` : '';
  document.getElementById('workDate').value = new Date().toISOString().split('T')[0];
  
  await loadWorkers();
  await loadProducts();
  await loadBomData();
  renderEquipmentGrid();

  document.getElementById('shiftType').addEventListener('change', function() {
    document.getElementById('startTime').value = this.value === '주간' ? '08:00' : '17:30';
    document.getElementById('endTime').value = this.value === '주간' ? '17:00' : '20:30';
  });
  document.getElementById('workDate').addEventListener('change', () => { if (selectedEquipment) checkTodaySafety(); });
}

async function loadWorkers() {
  const { data } = await db.from('workers').select('name, name_local').eq('process', '조립').eq('active', true).order('name');
  workersCache = (data || []).map(w => ({ name: w.name, nameLocal: w.name_local }));
  if (myInfo && myInfo.name && !workersCache.find(w => w.name === myInfo.name)) workersCache.unshift({ name: myInfo.name, nameLocal: null });
  const sel = document.getElementById('workerSelect');
  sel.innerHTML = '<option value="">선택하세요...</option>';
  workersCache.forEach(w => {
    const display = w.nameLocal ? `${w.name} (${w.nameLocal})` : w.name;
    sel.innerHTML += `<option value="${w.name}" ${myInfo && myInfo.name === w.name ? 'selected' : ''}>${display}</option>`;
  });
}

async function loadProducts() {
  productsCache = [];
  let from = 0;
  while (true) {
    const { data } = await db.from('products').select('sabun, part_no, part_name').range(from, from + 999);
    if (!data || data.length === 0) break;
    productsCache = productsCache.concat(data);
    if (data.length < 1000) break;
    from += 1000;
  }
}

async function loadBomData() {
  const { data } = await db.from('assembly_bom').select('*');
  ASSEMBLY_BOM = {};
  if (data) {
    data.forEach(r => {
      ASSEMBLY_BOM[r.sabun] = { type: r.assembly_type, method: r.work_method, parts: r.parts || {} };
    });
  }
  console.log('✅ BOM 로딩 완료:', Object.keys(ASSEMBLY_BOM).length, '건');
}

// ═══════════════════════════════════════════════
// 설비 선택
// ═══════════════════════════════════════════════
function renderEquipmentGrid() {
  const grid = document.getElementById('equipmentGrid');
  const typeLabels = { guide:'GUIDE 조립', washer:'와샤/부쉬', rod:'ROD 조립', sander:'사상기', cutter:'절단기', manual:'수작업' };
  grid.innerHTML = EQUIPMENTS.map(eq => `
    <div class="eq-card" data-no="${eq.no}" onclick="selectEquipment('${eq.no}')" ${eq.type==='manual'?'style="border-style:dashed;border-color:#d97706"':''}>
      <div class="eq-name">${eq.no}</div>
      <div class="eq-detail">${eq.id}</div>
      <span class="eq-badge ${eq.type}" ${eq.type==='manual'?'style="background:#fef3c7;color:#92400e"':''}>${typeLabels[eq.type]}</span>
    </div>
  `).join('');
}

function selectEquipment(eqNo) {
  selectedEquipment = EQUIPMENTS.find(e => e.no === eqNo);
  if (!selectedEquipment) return;
  document.querySelectorAll('.eq-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.eq-card[data-no="${eqNo}"]`).classList.add('selected');
  const display = document.getElementById('selectedDisplay');
  display.textContent = `✓ 선택됨: ${selectedEquipment.no} (${selectedEquipment.id})`;
  display.style.display = 'block';
  
  // 수작업이면 점검 패스
  if (selectedEquipment.type === 'manual') {
    document.getElementById('safetySection').style.display = 'none';
    safetyCheckCompleted = true;
    document.getElementById('workArea').classList.remove('work-area-locked');
    document.getElementById('lockMessage').style.display = 'none';
    showToast('수작업 선택 — 설비 점검 없이 바로 작성 가능');
    if (document.querySelectorAll('#mainRows tr').length === 0) { for (let i = 0; i < 3; i++) addRow(); }
  } else {
    document.getElementById('safetySection').style.display = 'block';
    initSafetyTable();
    checkTodaySafety();
  }
}

// ═══════════════════════════════════════════════
// 설비 점검 (선택된 설비의 항목만 표시)
// ═══════════════════════════════════════════════
function initSafetyTable() {
  if (!selectedEquipment) return;
  const tbody = document.getElementById('safetyRows');
  tbody.innerHTML = '';
  const itemNums = EQUIPMENT_SAFETY_MAP[selectedEquipment.no] || [];
  
  itemNums.forEach((num, idx) => {
    const label = SAFETY_ALL_ITEMS[num] || `항목 ${num}`;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="item-cell"><span class="item-num">${idx+1}</span>${label}</td>
      <td>
        <div class="check-select-safety" data-item="${num}">
          ${SAFETY_OPTIONS.map(opt => `<button type="button" class="${opt.class} ${opt.value==='○'?'active':''}" data-value="${opt.value}" onclick="setSafetyCheck(${num},'${opt.value}',this)" title="${opt.value === '○' ? 'OK' : opt.value === '△' ? 'Need repair' : opt.value === '×' ? 'Unusable' : 'Not running'}">${opt.value}</button>`).join('')}
        </div>
      </td>`;
    tbody.appendChild(tr);
  });

  safetyCheckCompleted = false;
  document.getElementById('workArea').classList.add('work-area-locked');
  document.getElementById('lockMessage').style.display = 'block';
  document.getElementById('safetyStatus').textContent = '점검 진행 중';
}

function setSafetyCheck(itemNum, value, btn) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setAllSafety(value) {
  document.querySelectorAll('.check-select-safety').forEach(div => {
    div.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    const target = div.querySelector(`button[data-value="${value}"]`);
    if (target) target.classList.add('active');
  });
  showToast(`✓ 전체 항목 "${value}"로 설정됨`);
}

function collectSafetyData() {
  const result = {};
  const itemNums = EQUIPMENT_SAFETY_MAP[selectedEquipment.no] || [];
  itemNums.forEach(num => {
    const active = document.querySelector(`.check-select-safety[data-item="${num}"] button.active`);
    result[num] = active ? active.dataset.value : '○';
  });
  return result;
}

async function completeSafetyCheck() {
  if (!selectedEquipment) { showToast('설비를 먼저 선택하세요.', 'error'); return; }
  const checkData = collectSafetyData();
  const workDate = document.getElementById('workDate').value;
  if (!workDate) { showToast('작업 일자를 선택하세요.', 'error'); return; }

  try {
    const payload = { check_date: workDate, equipment_no: selectedEquipment.no, equipment_id: selectedEquipment.id, check_data: checkData, overall_remarks: document.getElementById('safetyOverallRemarks').value || null, checked_by_emp_code: myInfo?.emp_code, checked_by_name: myInfo?.name, checked_at: new Date().toISOString() };
    if (existingSafetyId) await db.from('assembly_safety_check').update(payload).eq('id', existingSafetyId);
    else await db.from('assembly_safety_check').insert(payload);
  } catch(e) { console.log('assembly_safety_check 저장 스킵:', e); }

  safetyCheckCompleted = true;
  document.getElementById('workArea').classList.remove('work-area-locked');
  document.getElementById('lockMessage').style.display = 'none';
  document.getElementById('safetyStatus').textContent = '✓ 점검 완료';
  showToast('✓ 설비 점검 완료! 작업 내역을 입력하세요.');
  if (document.querySelectorAll('#mainRows tr').length === 0) { for (let i = 0; i < 3; i++) addRow(); }
}

async function checkTodaySafety() {
  if (!selectedEquipment) return;
  const workDate = document.getElementById('workDate').value;
  if (!workDate) return;
  try {
    const { data } = await db.from('assembly_safety_check').select('*').eq('check_date', workDate).eq('equipment_no', selectedEquipment.no).order('checked_at', { ascending: false }).limit(1);
    if (data && data.length > 0) {
      existingSafetyId = data[0].id;
      const cd = data[0].check_data;
      if (cd) { Object.keys(cd).forEach(num => { const btn = document.querySelector(`.check-select-safety[data-item="${num}"] button[data-value="${cd[num]}"]`); if (btn) { btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); } }); }
      if (data[0].overall_remarks) document.getElementById('safetyOverallRemarks').value = data[0].overall_remarks;
      safetyCheckCompleted = true;
      document.getElementById('workArea').classList.remove('work-area-locked');
      document.getElementById('lockMessage').style.display = 'none';
      document.getElementById('safetyStatus').textContent = '✓ 점검 완료';
      if (document.querySelectorAll('#mainRows tr').length === 0) { for (let i = 0; i < 3; i++) addRow(); }
    } else { existingSafetyId = null; }
  } catch(e) {
    safetyCheckCompleted = true;
    document.getElementById('workArea').classList.remove('work-area-locked');
    document.getElementById('lockMessage').style.display = 'none';
    if (document.querySelectorAll('#mainRows tr').length === 0) { for (let i = 0; i < 3; i++) addRow(); }
  }
}

// ═══════════════════════════════════════════════
// 작업 행 추가/삭제 + BOM 자동계산
// ═══════════════════════════════════════════════
function addRow() {
  rowCounter++;
  const rowId = `row_${rowCounter}`;
  const tr = document.createElement('tr');
  tr.id = rowId;
  tr.innerHTML = `
    <td style="text-align:center"><strong>${document.querySelectorAll('#mainRows tr').length + 1}</strong></td>
    <td><input type="text" class="sabun" placeholder="제품코드" oninput="onSabunChange('${rowId}')" /></td>
    <td><input type="text" class="product-name" placeholder="자동" readonly style="color:#999;background:#f5f5f5" /></td>
    <td><span class="assembly-type" style="font-size:12px;color:#888">-</span></td>
    <td><span class="work-method">-</span></td>
    <td><input type="number" class="prod-qty" placeholder="수량" min="0" oninput="calcBom('${rowId}')" /></td>
    <td><input type="number" class="defect-qty" placeholder="0" min="0" value="0" /></td>
    <td><div class="bom-display" id="bom_${rowId}">사번 입력 시 자동 표시</div></td>
    <td><input type="text" class="note" placeholder="" /></td>
    <td><button class="btn-del-row" onclick="deleteRow('${rowId}')">×</button></td>
  `;
  document.getElementById('mainRows').appendChild(tr);
  renumberRows();
}

function deleteRow(rowId) {
  if (document.querySelectorAll('#mainRows tr').length <= 1) { showToast('최소 1개 행은 있어야 해요.', 'error'); return; }
  document.getElementById(rowId).remove();
  renumberRows();
}

function renumberRows() {
  document.querySelectorAll('#mainRows tr').forEach((tr, i) => { tr.querySelector('td:first-child strong').textContent = i + 1; });
  document.getElementById('rowCount').textContent = document.querySelectorAll('#mainRows tr').length + '건';
}

function onSabunChange(rowId) {
  const tr = document.getElementById(rowId);
  const sabun = tr.querySelector('.sabun').value.trim();
  const prodInput = tr.querySelector('.product-name');
  const typeSpan = tr.querySelector('.assembly-type');
  const methodSpan = tr.querySelector('.work-method');

  if (!sabun) { prodInput.value = ''; typeSpan.textContent = '-'; methodSpan.innerHTML = '-'; document.getElementById('bom_' + rowId).innerHTML = '사번 입력 시 자동 표시'; return; }

  // 제품명 자동
  const product = productsCache.find(p => String(p.sabun).trim() === sabun);
  if (product) { prodInput.value = product.part_name || product.part_no || ''; prodInput.style.color = '#333'; prodInput.style.background = '#d4edda'; setTimeout(() => prodInput.style.background = '#f5f5f5', 600); }
  else { prodInput.value = ''; }

  // BOM 정보 자동
  const bom = ASSEMBLY_BOM[sabun];
  if (bom) {
    typeSpan.textContent = bom.type;
    typeSpan.style.color = bom.type === 'ROD' ? '#9a3412' : bom.type === 'STRIKER' ? '#243bb2' : '#666';
    methodSpan.innerHTML = `<span class="method-badge ${bom.method === '수작업' ? 'method-manual' : 'method-auto'}">${bom.method}</span>`;
    tr.querySelector('.prod-qty').disabled = false;
    tr.querySelector('.prod-qty').style.background = '#fafbfd';
    calcBom(rowId);
  } else {
    typeSpan.textContent = '-';
    methodSpan.innerHTML = '-';
    document.getElementById('bom_' + rowId).innerHTML = '<span style="color:#dc2626;font-size:11px">🚫 BOM 미등록 — 기준정보에서 등록 후 사용하세요</span>';
    // 수량 입력 차단
    tr.querySelector('.prod-qty').disabled = true;
    tr.querySelector('.prod-qty').value = '';
    tr.querySelector('.prod-qty').style.background = '#fef2f2';
  }
}

function calcBom(rowId) {
  const tr = document.getElementById(rowId);
  const sabun = tr.querySelector('.sabun').value.trim();
  const qty = parseInt(tr.querySelector('.prod-qty').value) || 0;
  const bomDiv = document.getElementById('bom_' + rowId);
  const bom = ASSEMBLY_BOM[sabun];

  if (!bom || !bom.parts) { return; }

  if (qty === 0) {
    bomDiv.innerHTML = Object.entries(bom.parts).map(([type, val]) => {
      const [code, us] = val.split(':');
      return `<span class="bom-tag">${type}: ${code} ×${us}</span>`;
    }).join(' ');
    return;
  }

  bomDiv.innerHTML = Object.entries(bom.parts).map(([type, val]) => {
    const [code, us] = val.split(':');
    const total = qty * parseInt(us);
    return `<span class="bom-tag" style="background:#d4edda;color:#166534">${type}: ${code} <strong>×${total}</strong></span>`;
  }).join(' ');
}

// ═══════════════════════════════════════════════
// 제출
// ═══════════════════════════════════════════════
async function submitReport() {
  const workDate = document.getElementById('workDate').value;
  const shiftType = document.getElementById('shiftType').value;
  const workerName = document.getElementById('workerSelect').value;
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;

  if (!workDate) { showToast('작업 일자를 선택하세요.', 'error'); return; }
  if (!workerName) { showToast('작업자를 선택하세요.', 'error'); return; }
  if (!selectedEquipment) { showToast('설비를 선택하세요.', 'error'); return; }

  const remarks = document.getElementById('remarks').value.trim() || null;
  const rows = document.querySelectorAll('#mainRows tr');
  const reportRows = [];

  for (const tr of rows) {
    const sabun = tr.querySelector('.sabun').value.trim();
    const productName = tr.querySelector('.product-name').value.trim();
    const prodQty = parseInt(tr.querySelector('.prod-qty').value) || null;
    const defectQty = parseInt(tr.querySelector('.defect-qty').value) || 0;
    const note = tr.querySelector('.note').value.trim();
    if (!sabun && !prodQty) continue;
    if (!sabun) { showToast('사번(제품코드) 필수', 'error'); return; }

    const bom = ASSEMBLY_BOM[sabun];
    let materialUsage = {};
    if (bom && bom.parts && prodQty) {
      Object.entries(bom.parts).forEach(([type, val]) => {
        const [code, us] = val.split(':');
        materialUsage[code] = prodQty * parseInt(us);
      });
    }

    reportRows.push({
      work_date: workDate, shift_type: shiftType,
      equipment_no: selectedEquipment.no, equipment_id: selectedEquipment.id,
      start_time: startTime, end_time: endTime, worker_name: workerName,
      sabun, product_name: productName || null,
      assembly_type: bom ? bom.type : null, work_method: bom ? bom.method : '자동',
      production_qty: prodQty, defect_qty: defectQty,
      material_usage: materialUsage,
      note: note || remarks, created_by_emp_code: myInfo?.emp_code, created_by_name: myInfo?.name
    });
  }

  if (reportRows.length === 0) { showToast('입력된 작업 내역이 없어요.', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '제출 중...';
  const { error } = await db.from('assembly_reports').insert(reportRows);
  btn.disabled = false; btn.textContent = '제출하기';

  if (error) { showToast('제출 실패: ' + error.message, 'error'); return; }
  showToast(`✓ ${reportRows.length}건 제출 완료!`);
  loadMyHistory();
  setTimeout(() => resetForm(false), 1500);
}

// ── 오늘 내 제출 내역 ──
async function loadMyHistory() {
  const workDate = document.getElementById('workDate').value;
  const myName = myInfo?.name;
  if (!workDate || !myName) return;

  const { data } = await db.from('assembly_reports')
    .select('*')
    .eq('work_date', workDate)
    .eq('created_by_name', myName)
    .is('deleted_at', null)
    .order('created_at', { ascending: false });

  const body = document.getElementById('myHistoryBody');
  const countEl = document.getElementById('myHistoryCount');
  const list = data || [];
  countEl.textContent = list.length + '건';

  if (list.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:20px">오늘 제출한 내역이 없습니다.</div>';
    return;
  }

  body.innerHTML = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#f0f3f9">
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700">NO</th>
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700">사번</th>
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700">제품명</th>
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700">설비</th>
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700;text-align:right">생산</th>
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700;text-align:right">불량</th>
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700">제출시간</th>
      <th style="padding:8px 6px;border:1px solid #e0e4ed;color:#243bb2;font-weight:700">작업</th>
    </tr></thead>
    <tbody>${list.map((r, i) => {
      const time = r.created_at ? new Date(r.created_at).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) : '';
      return `<tr>
        <td style="padding:8px 6px;border:1px solid #e0e4ed;text-align:center">${i+1}</td>
        <td style="padding:8px 6px;border:1px solid #e0e4ed">${r.sabun||''}</td>
        <td style="padding:8px 6px;border:1px solid #e0e4ed;font-size:11px">${r.product_name||''}</td>
        <td style="padding:8px 6px;border:1px solid #e0e4ed;font-size:11px">${r.equipment_no||''}</td>
        <td style="padding:8px 6px;border:1px solid #e0e4ed;text-align:right;font-weight:600">${(r.production_qty||0).toLocaleString()}</td>
        <td style="padding:8px 6px;border:1px solid #e0e4ed;text-align:right;color:${(r.defect_qty||0)>0?'#dc2626':'#666'}">${r.defect_qty||0}</td>
        <td style="padding:8px 6px;border:1px solid #e0e4ed;color:#888;font-size:11px">${time}</td>
        <td style="padding:8px 6px;border:1px solid #e0e4ed;text-align:center"><button onclick="deleteMyRecord('${r.id}')" style="background:#fef2f2;color:#dc2626;border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:600">삭제</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

async function deleteMyRecord(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  await db.from('assembly_reports').update({ deleted_at: new Date().toISOString() }).eq('id', id);
  try { await db.from('audit_logs').insert({ table_name:'assembly_reports', record_id:id, action:'DELETE', performed_by:myInfo?.name||'-', performed_at:new Date().toISOString() }); } catch(e) {}
  loadMyHistory();
  showToast('✓ 삭제 완료');
}

function resetForm(askConfirm = true) {
  if (askConfirm && !confirm('입력한 내용을 모두 초기화할까요?')) return;
  document.getElementById('mainRows').innerHTML = '';
  rowCounter = 0;
  document.getElementById('remarks').value = '';
  document.getElementById('rowCount').textContent = '0건';
  if (safetyCheckCompleted) { for (let i = 0; i < 3; i++) addRow(); }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function confirmLeave(e) {
  e.preventDefault();
  const hasInput = document.querySelectorAll('#mainRows tr').length > 0 && Array.from(document.querySelectorAll('#mainRows .sabun')).some(i => i.value.trim());
  if (!hasInput) { location.href = 'index.html'; return; }
  if (confirm('작성 중인 내용이 있어요.\n제출하지 않고 메인으로 이동할까요?')) { location.href = 'index.html'; }
}
