<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 변경 - HKHT</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #243bb2 0%, #1a2a85 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: white; border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.logo-area { text-align: center; margin-bottom: 1.5rem; }
.logo-area img { max-width: 180px; height: auto; }
.notice-box { background: #fef3c7; border: 1px solid #fde68a; border-radius: 10px; padding: 14px 16px; margin-bottom: 1.5rem; }
.notice-title { font-size: 14px; font-weight: 600; color: #92400e; margin-bottom: 4px; }
.notice-msg { font-size: 12px; color: #92400e; line-height: 1.6; }
.user-info { background: #f9f9f9; border-radius: 10px; padding: 12px 16px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
.user-emp { font-size: 12px; color: #888; }
.user-name-display { font-size: 14px; font-weight: 600; color: #111; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; color: #555; margin-bottom: 6px; display: block; font-weight: 500; }
.form-input { width: 100%; font-size: 15px; border: 2px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; outline: none; font-family: inherit; color: #111; transition: border-color 0.15s; }
.form-input:focus { border-color: #243bb2; }
.form-help { font-size: 11px; color: #aaa; margin-top: 4px; }
.error-msg { background: #fff5f5; border: 1px solid #fca5a5; color: #e53e3e; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; display: none; }
.error-msg.show { display: block; }
.password-rules { background: #f9f9f9; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; }
.rule-title { font-size: 11px; color: #666; font-weight: 500; margin-bottom: 6px; }
.rule-item { font-size: 12px; color: #aaa; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.rule-item.ok { color: #16a34a; }
.rule-item.fail { color: #aaa; }
.rule-icon { font-size: 11px; }
.btn-submit { width: 100%; font-size: 15px; padding: 13px; border-radius: 10px; background: #243bb2; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; transition: opacity 0.15s; }
.btn-submit:hover:not(:disabled) { opacity: 0.9; }
.btn-submit:disabled { background: #aaa; cursor: not-allowed; }
.spinner { display: none; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
.spinner.active { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-logout { display: block; text-align: center; font-size: 12px; color: #888; margin-top: 1rem; background: none; border: none; cursor: pointer; font-family: inherit; width: 100%; padding: 8px; }
.btn-logout:hover { color: #555; }
</style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <img src="hkht_logo.png" alt="㈜한국하이테크" />
  </div>

  <div class="notice-box">
    <div class="notice-title">🔐 보안을 위해 비밀번호를 변경해주세요</div>
    <div class="notice-msg">
      현재 사용 중인 비밀번호는 입사코드와 동일한 초기 비밀번호예요.<br>
      안전한 시스템 사용을 위해 새 비밀번호로 변경해주세요.
    </div>
  </div>

  <div class="user-info">
    <div>
      <div class="user-emp" id="empCodeDisplay">-</div>
      <div class="user-name-display" id="userNameDisplay">-</div>
    </div>
    <div style="font-size:24px">👋</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label class="form-label">새 비밀번호</label>
    <input class="form-input" type="password" id="newPassword"
      placeholder="새 비밀번호 입력 (6자 이상)" oninput="checkRules()" />
  </div>

  <div class="form-group">
    <label class="form-label">새 비밀번호 확인</label>
    <input class="form-input" type="password" id="confirmPassword"
      placeholder="새 비밀번호 다시 입력" oninput="checkRules()"
      onkeydown="if(event.key==='Enter') changePassword()" />
  </div>

  <div class="password-rules">
    <div class="rule-title">비밀번호 조건</div>
    <div class="rule-item" id="rule_length"><span class="rule-icon">○</span> 6자 이상 입력</div>
    <div class="rule-item" id="rule_diff"><span class="rule-icon">○</span> 입사코드와 다른 비밀번호</div>
    <div class="rule-item" id="rule_match"><span class="rule-icon">○</span> 비밀번호 확인 일치</div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="changePassword()" disabled>
    <span class="spinner" id="spinner"></span>
    <span id="submitText">비밀번호 변경 완료</span>
  </button>

  <button class="btn-logout" onclick="logout()">다른 계정으로 로그인</button>
</div>

<script>
const SUPABASE_URL = 'https://vpaixxlhzkwtgcllimvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwYWl4eGxoemt3dGdjbGxpbXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzk4NjMsImV4cCI6MjA5MTk1NTg2M30.V8Bj0cMbM0E2TFhklYYa7TM-vO6Fi70ctACA7uUf4Ig';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userInfo = null;

async function init() {
  // 세션 확인
  const { data: { session } } = await db.auth.getSession();
  if (!session) { location.href = 'login.html'; return; }

  // 사용자 정보 조회
  const { data } = await db.from('users')
    .select('*')
    .eq('auth_user_id', session.user.id)
    .single();

  if (!data) {
    alert('사용자 정보를 찾을 수 없어요.');
    await db.auth.signOut();
    location.href = 'login.html';
    return;
  }

  // 이미 변경된 사용자라면 메인으로
  if (data.password_changed) {
    location.href = 'index.html';
    return;
  }

  userInfo = data;
  document.getElementById('empCodeDisplay').textContent = '입사코드: ' + data.emp_code;
  document.getElementById('userNameDisplay').textContent = data.name + '님';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

function checkRules() {
  if (!userInfo) return;
  const pwd = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  // 길이 확인
  const lengthOk = pwd.length >= 6;
  document.getElementById('rule_length').classList.toggle('ok', lengthOk);
  document.getElementById('rule_length').classList.toggle('fail', !lengthOk && pwd.length > 0);
  document.getElementById('rule_length').querySelector('.rule-icon').textContent = lengthOk ? '✓' : '○';

  // 입사코드와 다른지
  const diffOk = pwd.length > 0 && pwd !== userInfo.emp_code;
  document.getElementById('rule_diff').classList.toggle('ok', diffOk);
  document.getElementById('rule_diff').classList.toggle('fail', !diffOk && pwd.length > 0);
  document.getElementById('rule_diff').querySelector('.rule-icon').textContent = diffOk ? '✓' : '○';

  // 비밀번호 일치
  const matchOk = pwd.length > 0 && pwd === confirm;
  document.getElementById('rule_match').classList.toggle('ok', matchOk);
  document.getElementById('rule_match').classList.toggle('fail', !matchOk && confirm.length > 0);
  document.getElementById('rule_match').querySelector('.rule-icon').textContent = matchOk ? '✓' : '○';

  // 모든 조건 만족 시 버튼 활성화
  document.getElementById('submitBtn').disabled = !(lengthOk && diffOk && matchOk);

  hideError();
}

async function changePassword() {
  const pwd = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  hideError();

  if (pwd.length < 6) { showError('비밀번호는 6자 이상이어야 해요.'); return; }
  if (pwd === userInfo.emp_code) { showError('입사코드와 다른 비밀번호로 설정해주세요.'); return; }
  if (pwd !== confirm) { showError('비밀번호가 일치하지 않아요.'); return; }

  // 버튼 로딩
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const txt = document.getElementById('submitText');
  btn.disabled = true;
  spinner.classList.add('active');
  txt.textContent = '변경 중...';

  // 1. Auth 비밀번호 변경
  const { error: authError } = await db.auth.updateUser({ password: pwd });
  if (authError) {
    showError('비밀번호 변경 실패: ' + authError.message);
    spinner.classList.remove('active');
    txt.textContent = '비밀번호 변경 완료';
    btn.disabled = false;
    return;
  }

  // 2. password_changed 플래그 업데이트
  const { error: dbError } = await db.from('users')
    .update({ password_changed: true })
    .eq('auth_user_id', userInfo.auth_user_id);

  if (dbError) {
    showError('상태 업데이트 실패: ' + dbError.message);
    spinner.classList.remove('active');
    txt.textContent = '비밀번호 변경 완료';
    btn.disabled = false;
    return;
  }

  txt.textContent = '✓ 변경 완료!';
  setTimeout(() => location.href = 'index.html', 800);
}

async function logout() {
  if (!confirm('로그아웃 하시겠어요?')) return;
  await db.auth.signOut();
  location.href = 'login.html';
}

init();
</script>
</body>
</html>
