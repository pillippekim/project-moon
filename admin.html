<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 조회 및 추출 - HKHT</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth_guard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 1rem; }
.app { max-width: 1280px; margin: 0 auto; }
.top-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding: 0 0.25rem; }
.back-btn { font-size: 13px; color: #243bb2; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }
.back-btn:hover { text-decoration: underline; }
.nav-sep { color: #ddd; }
.nav-cur { font-size: 13px; color: #888; }
.card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1rem 1.25rem; margin-bottom: 1rem; }

/* 공정 탭 */
.process-tabs { display: flex; gap: 0; margin-bottom: 1rem; background: white; border-radius: 12px; border: 1px solid #e5e5e5; overflow: hidden; }
.process-tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 500; color: #888; border: none; background: transparent; font-family: inherit; transition: all 0.15s; border-bottom: 2.5px solid transparent; }
.process-tab:hover { color: #243bb2; background: #f9f9f9; }
.process-tab.active { color: #243bb2; border-bottom-color: #243bb2; background: #eff6ff; }

/* 필터 바 */
.filter-bar { display: flex; gap: 10px; margin-bottom: 1rem; align-items: end; flex-wrap: wrap; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-size: 11px; color: #888; }
.filter-input { font-size: 13px; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 12px; outline: none; font-family: inherit; color: #111; min-width: 140px; }
.filter-input:focus { border-color: #243bb2; }
.btn-search { font-size: 13px; padding: 9px 18px; border-radius: 8px; background: #243bb2; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; }
.btn-excel { font-size: 13px; padding: 9px 16px; border-radius: 8px; background: #16a34a; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; }
.btn-toggle-view { font-size: 12px; padding: 7px 14px; border-radius: 8px; background: white; color: #555; border: 1px solid #ddd; cursor: pointer; font-family: inherit; }
.btn-toggle-view.active { background: #eff6ff; color: #243bb2; border-color: #243bb2; }

/* 통계 */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1rem; }
.stat-card { background: white; border-radius: 10px; border: 1px solid #e5e5e5; padding: 0.85rem 1rem; }
.stat-icon { font-size: 20px; margin-bottom: 6px; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-num { font-size: 22px; font-weight: 600; color: #111; }
.stat-num.blue { color: #243bb2; }
.stat-num.green { color: #16a34a; }
.stat-num.orange { color: #ea580c; }
.stat-num.red { color: #e53e3e; }
.stat-unit { font-size: 12px; color: #aaa; font-weight: 400; }

/* 테이블 */
.table-wrap { overflow-x: auto; max-height: 70vh; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
th { font-size: 12px; font-weight: 500; color: #888; padding: 9px 12px; background: #f9f9f9; border-bottom: 1px solid #eee; text-align: left; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; color: #111; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }
.empty-row td { text-align: center; color: #aaa; padding: 2rem; font-size: 14px; }
.lot-tag { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #fef9c3; color: #ca8a04; margin: 1px; font-weight: 500; }
.process-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.process-포장 { background: #eff6ff; color: #243bb2; }
.process-검사 { background: #f0fdf4; color: #16a34a; }
.process-재단 { background: #fff7ed; color: #ea580c; }
.process-도포 { background: #fdf4ff; color: #9333ea; }
.process-쇼트 { background: #fef2f2; color: #dc2626; }
.process-성형 { background: #f0f9ff; color: #0284c7; }
.defect-cell { color: #e53e3e; font-weight: 500; }
.pass-cell { color: #16a34a; font-weight: 500; }

/* 섹션 (전체 탭에서 사용) */
.process-section { margin-bottom: 1.5rem; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-title { font-size: 14px; font-weight: 600; color: #111; }
.section-count { font-size: 12px; color: #888; background: #f3f4f6; padding: 3px 10px; border-radius: 10px; }
.section-card { background: white; border-radius: 10px; border: 1px solid #e5e5e5; padding: 1rem 1.25rem; }
.btn-section-detail { font-size: 12px; color: #243bb2; background: none; border: none; cursor: pointer; font-family: inherit; }
.btn-section-detail:hover { text-decoration: underline; }

.toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 999; }
.toast.show { display: block; }

.hidden { display: none !important; }

/* 행 액션 버튼 */
.row-actions { display: flex; gap: 4px; }
.btn-row { font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-family: inherit; border: none; white-space: nowrap; }
.btn-row-edit { background: #eff6ff; color: #243bb2; }
.btn-row-edit:hover { background: #dbeafe; }
.btn-row-edit:disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; }
.btn-row-del { background: transparent; color: #e53e3e; border: 1px solid #fca5a5; }
.btn-row-del:hover { background: #fff0f0; }
.btn-row-del:disabled { color: #ccc; border-color: #eee; cursor: not-allowed; }

/* 모달 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal-box { background: white; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: #888; margin-bottom: 1rem; }
.modal-grid { display: grid; gap: 12px; margin-bottom: 1rem; }
.modal-grid-2 { grid-template-columns: 1fr 1fr; }
.modal-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.modal-field { display: flex; flex-direction: column; gap: 4px; }
.modal-label { font-size: 12px; color: #888; }
.modal-input { font-size: 13px; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 10px; outline: none; font-family: inherit; color: #111; }
.modal-input:focus { border-color: #243bb2; }
.modal-input.readonly { background: #f9f9f9; color: #888; }
.modal-textarea { font-size: 13px; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 10px; outline: none; font-family: inherit; color: #111; resize: none; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
.btn-modal-cancel { font-size: 13px; padding: 9px 18px; border-radius: 8px; background: transparent; color: #888; border: 1px solid #ddd; cursor: pointer; font-family: inherit; }
.btn-modal-save { font-size: 13px; padding: 9px 18px; border-radius: 8px; background: #243bb2; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; }
.btn-modal-del { font-size: 13px; padding: 9px 18px; border-radius: 8px; background: #e53e3e; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; }

/* 삭제됨 표시 */
.deleted-row { opacity: 0.5; background: #fef2f2 !important; }
.deleted-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #fef2f2; color: #dc2626; font-weight: 500; margin-left: 4px; }
.show-deleted-toggle { font-size: 12px; padding: 6px 12px; border-radius: 6px; background: white; color: #555; border: 1px solid #ddd; cursor: pointer; font-family: inherit; }
.show-deleted-toggle.active { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
</style>
</head>
<body>
<div class="app">
  <div class="top-nav">
    <button class="back-btn" onclick="location.href='index.html'">← 메인으로</button>
    <span class="nav-sep">/</span>
    <span class="nav-cur">데이터 조회 및 추출</span>
  </div>

  <!-- 공정 탭 -->
  <div class="process-tabs">
    <button class="process-tab active" data-process="all" onclick="switchProcess('all')">📊 전체</button>
    <button class="process-tab" data-process="포장" onclick="switchProcess('포장')">📦 포장</button>
    <button class="process-tab" data-process="검사" onclick="switchProcess('검사')">🔬 검사</button>

    <button class="process-tab" data-process="도포" onclick="switchProcess('도포')" disabled style="opacity:0.5">🎨 도포</button>
    <button class="process-tab" data-process="쇼트" onclick="switchProcess('쇼트')" disabled style="opacity:0.5">💥 쇼트</button>
    <button class="process-tab" data-process="성형" onclick="switchProcess('성형')" disabled style="opacity:0.5">🔧 성형</button>
  </div>

  <!-- 필터 -->
  <div class="card">
    <div class="filter-bar">
      <div class="filter-group">
        <label class="filter-label">시작일</label>
        <input class="filter-input" type="date" id="startDate" />
      </div>
      <div class="filter-group">
        <label class="filter-label">종료일</label>
        <input class="filter-input" type="date" id="endDate" />
      </div>
      <div class="filter-group">
        <label class="filter-label">사번</label>
        <input class="filter-input" type="text" id="filterSabun" placeholder="사번 검색" />
      </div>
      <div class="filter-group">
        <label class="filter-label">작업자</label>
        <input class="filter-input" type="text" id="filterWorker" placeholder="작업자 이름" />
      </div>
      <button class="btn-search" onclick="loadData()">🔍 조회</button>
      <button class="btn-excel" onclick="downloadExcel()">📥 엑셀 다운로드</button>

      <!-- 전체 탭에서만 보이는 토글 -->
      <button class="btn-toggle-view hidden" id="toggleViewBtn" onclick="toggleUnifiedView()">
        👁️ 통합 보기
      </button>

      <!-- 슈퍼관리자만 보이는 삭제 포함 토글 -->
      <button class="show-deleted-toggle hidden" id="showDeletedBtn" onclick="toggleShowDeleted()">
        🗑️ 삭제 포함
      </button>
    </div>
  </div>

  <!-- 통계 -->
  <div class="stats-row" id="statsRow"></div>

  <!-- 결과 -->
  <div id="resultArea"></div>
</div>

<!-- 삭제 확인 모달 -->

<script>
const SUPABASE_URL = 'https://vpaixxlhzkwtgcllimvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwYWl4eGxoemt3dGdjbGxpbXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzk4NjMsImV4cCI6MjA5MTk1NTg2M30.V8Bj0cMbM0E2TFhklYYa7TM-vO6Fi70ctACA7uUf4Ig';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentProcess = 'all';
let unifiedView = false;
let cachedData = { 포장: [], 검사: [] };
let PRODUCTS = {};
let myInfo = null;
let showDeleted = false;

// 부서별 권한 매트릭스 (수정/삭제 가능 부서)
const FULL_ACCESS_DEPTS = ['생산관리팀','연구개발팀','품질관리팀','경영지원팀','물류관리팀'];

// 24시간 (밀리초)
const HOURS_24 = 24 * 60 * 60 * 1000;

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function firstDayOfMonth() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';
}
function fmtDate(s) { return s ? s.slice(0,10) : '-'; }
function fmtDatetime(s) {
  if (!s) return '-';
  const d = new Date(s);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadProducts() {
  const { data } = await db.from('products').select('sabun, part_no, part_name');
  if (data) {
    data.forEach(r => { PRODUCTS[r.sabun] = { partNo: r.part_no || '', partName: r.part_name || '' }; });
  }
}

async function loadMyInfo() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) return;
  const { data } = await db.from('users').select('*').eq('auth_user_id', session.user.id).single();
  myInfo = data;
  // 슈퍼관리자만 "삭제 포함" 토글 표시
  if (myInfo && myInfo.user_type === 'super') {
    document.getElementById('showDeletedBtn').classList.remove('hidden');
  }
}

// 수정/삭제 권한 판별
function canEditDelete(record) {
  if (!myInfo) return false;

  // 슈퍼관리자: 무제한
  if (myInfo.user_type === 'super') return true;

  // 관리자: 부서 권한 + 무제한
  if (myInfo.user_type === 'admin' && FULL_ACCESS_DEPTS.includes(myInfo.department)) {
    return true;
  }

  // 작업자/일반 관리자: 본인 입력 + 24시간 이내
  if (record.created_by_emp_code === myInfo.emp_code) {
    const created = new Date(record.created_at || record.submitted_at).getTime();
    const now = Date.now();
    return (now - created) < HOURS_24;
  }
  return false;
}

// 권한 없을 때 사유 텍스트
function getCannotEditReason(record) {
  if (!myInfo) return '';
  if (record.created_by_emp_code !== myInfo.emp_code) {
    return '본인 입력 데이터만 수정 가능';
  }
  return '24시간 경과로 수정 불가';
}

// 변경 이력 기록
async function logAudit(action, table, recordId, before, after, reason) {
  if (!myInfo) return;
  await db.from('audit_logs').insert({
    table_name: table,
    record_id: recordId,
    action,
    changed_by_emp_code: myInfo.emp_code,
    changed_by_name: myInfo.name,
    changed_by_dept: myInfo.department || (myInfo.user_type === 'super' ? '슈퍼관리자' : myInfo.process || ''),
    before_data: before,
    after_data: after,
    reason: reason || null
  });
}

let deletingRecord = null;
function openDelete(table, record) {
  deletingRecord = { table, record };
  document.getElementById('del_table').value = table;
  document.getElementById('del_id').value = record.id;

  const reason = document.getElementById('del_reason').value.trim();
  if (!reason) { showToast('삭제 사유를 입력해주세요.'); return; }

  const { table, record } = deletingRecord;

  };

// 슈퍼관리자: 삭제된 데이터 복구
async function restoreRecord(table, recordId) {
  if (!confirm('이 데이터를 복구하시겠어요?')) return;
  const { error } = await db.from(table).update({
    deleted_at: null,
    deleted_by: null,
    deleted_reason: null
  }).eq('id', recordId);
  if (error) { showToast('복구 실패: ' + error.message); return; }
  await logAudit('restore', table, recordId, null, null, null);
  showToast('복구 완료 ✓');
  loadData();
}

function switchProcess(p) {
  currentProcess = p;
  document.querySelectorAll('.process-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-process="${p}"]`).classList.add('active');
  // 전체 탭에서만 통합 보기 토글 노출
  document.getElementById('toggleViewBtn').classList.toggle('hidden', p !== 'all');
  if (p !== 'all') unifiedView = false;
  loadData();
}

function toggleUnifiedView() {
  unifiedView = !unifiedView;
  document.getElementById('toggleViewBtn').classList.toggle('active', unifiedView);
  document.getElementById('toggleViewBtn').textContent = unifiedView ? '📋 공정별 보기' : '👁️ 통합 보기';
  render();
}

async function loadData() {
  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value;
  if (!start || !end) { showToast('기간을 선택해주세요.'); return; }

  const fSabun  = document.getElementById('filterSabun').value.trim();
  const fWorker = document.getElementById('filterWorker').value.trim();

  // 포장 데이터 로드 (필요 시)
  if (currentProcess === 'all' || currentProcess === '포장') {
    let q = db.from('packaging_reports').select('*').gte('work_date', start).lte('work_date', end);
    if (!showDeleted) q = q.is('deleted_at', null);
    if (fSabun)  q = q.ilike('worker_id', `%${fSabun}%`);
    if (fWorker) q = q.ilike('worker_name', `%${fWorker}%`);
    const { data } = await q.order('work_date', { ascending: false });
    cachedData.포장 = data || [];
  }

  // 검사 데이터 로드 (필요 시)
  if (currentProcess === 'all' || currentProcess === '검사') {
    let q = db.from('inspection_reports').select('*').gte('work_date', start).lte('work_date', end);
    if (!showDeleted) q = q.is('deleted_at', null);
    if (fSabun)  q = q.ilike('worker_id', `%${fSabun}%`);
    if (fWorker) q = q.ilike('worker_name', `%${fWorker}%`);
    const { data } = await q.order('work_date', { ascending: false });
    cachedData.검사 = data || [];
  }

  render();
}

function render() {
  renderStats();
  if (currentProcess === 'all') {
    if (unifiedView) renderUnifiedTable();
    else renderAllSections();
  } else if (currentProcess === '포장') {
    renderPackagingTable(cachedData.포장);
  } else if (currentProcess === '검사') {
    renderInspectionTable(cachedData.검사);
  }
}

function renderStats() {
  const statsEl = document.getElementById('statsRow');
  const pkg = cachedData.포장 || [];
  const ins = cachedData.검사 || [];

  if (currentProcess === 'all') {
    const totalCount = pkg.length + ins.length;
    const totalQty = pkg.reduce((s,r)=>s+(r.quantity||0),0);
    const totalInspect = ins.reduce((s,r)=>s+(r.inspect_qty||0),0);
    const totalFail = ins.reduce((s,r)=>s+(r.fail_qty||0),0);
    statsEl.innerHTML = `
      <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-label">전체 작업일지</div><div class="stat-num blue">${totalCount} <span class="stat-unit">건</span></div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-label">포장수량</div><div class="stat-num green">${totalQty.toLocaleString()} <span class="stat-unit">EA</span></div></div>
      <div class="stat-card"><div class="stat-icon">🔬</div><div class="stat-label">검사수량</div><div class="stat-num orange">${totalInspect.toLocaleString()} <span class="stat-unit">EA</span></div></div>
      <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-label">불합격</div><div class="stat-num red">${totalFail.toLocaleString()} <span class="stat-unit">EA</span></div></div>
    `;
  } else if (currentProcess === '포장') {
    const totalQty = pkg.reduce((s,r)=>s+(r.quantity||0),0);
    const workers = new Set(pkg.map(r=>r.worker_name).filter(Boolean)).size;
    statsEl.innerHTML = `
      <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-label">작업일지 건수</div><div class="stat-num blue">${pkg.length} <span class="stat-unit">건</span></div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-label">총 포장수량</div><div class="stat-num green">${totalQty.toLocaleString()} <span class="stat-unit">EA</span></div></div>
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">작업자 수</div><div class="stat-num orange">${workers} <span class="stat-unit">명</span></div></div>
      <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-label">조회 기간</div><div class="stat-num" style="font-size:14px">${document.getElementById('startDate').value} ~<br>${document.getElementById('endDate').value}</div></div>
    `;
  } else if (currentProcess === '검사') {
    const totalInspect = ins.reduce((s,r)=>s+(r.inspect_qty||0),0);
    const totalPass = ins.reduce((s,r)=>s+(r.pass_qty||0),0);
    const totalFail = ins.reduce((s,r)=>s+(r.fail_qty||0),0);
    const passRate = totalInspect > 0 ? ((totalPass/totalInspect)*100).toFixed(1) : '0.0';
    statsEl.innerHTML = `
      <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-label">검사 건수</div><div class="stat-num blue">${ins.length} <span class="stat-unit">건</span></div></div>
      <div class="stat-card"><div class="stat-icon">🔬</div><div class="stat-label">총 검사수량</div><div class="stat-num orange">${totalInspect.toLocaleString()} <span class="stat-unit">EA</span></div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">합격 / 불합격</div><div class="stat-num green">${totalPass.toLocaleString()}<span class="stat-unit"> / </span><span style="color:#e53e3e">${totalFail.toLocaleString()}</span></div></div>
      <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-label">합격률</div><div class="stat-num green">${passRate} <span class="stat-unit">%</span></div></div>
    `;
  }
}

        <table>
          <thead>
            <tr><th>NO</th><th>작업일</th><th>사번</th><th>고객품번</th><th>품명</th><th>작업자</th><th>성형 LOT No.</th><th style="text-align:right">검사</th><th style="text-align:right">합격</th><th style="text-align:right">불합격</th><th>불량유형</th><th>메모</th><th>특이사항</th><th>입력자</th><th>제출일시</th><th>작업</th></tr>
          </thead>
          <tbody>
            ${data.map((r, i) => {
              const prod = PRODUCTS[r.worker_id] || {};
              const lots = (r.lot_nos||[]).map(l => `<span class="lot-tag">${l}</span>`).join('') || '-';
              const isDeleted = !!r.deleted_at;
              const canEdit = canEditDelete(r) && !isDeleted;
              const reason = canEdit ? '' : (isDeleted ? '삭제됨' : getCannotEditReason(r));
              const actionsHtml = isDeleted
                ? (myInfo && myInfo.user_type === 'super' ? `<button class="btn-row btn-row-edit" onclick="restoreRecord('inspection_reports', ${r.id})">복구</button>` : '<span style="color:#aaa;font-size:11px">삭제됨</span>')
                : `<div class="row-actions">
                    <button class="btn-row btn-row-edit" ${canEdit ? `onclick='openEditInspection(${JSON.stringify(r).replace(/'/g, "&#39;")})'` : 'disabled'} title="${reason}">수정</button>
                    <button class="btn-row btn-row-del" ${canEdit ? `onclick='openDelete("inspection_reports", ${JSON.stringify(r).replace(/'/g, "&#39;")})'` : 'disabled'} title="${reason}">삭제</button>
                  </div>`;
              return `<tr class="${isDeleted ? 'deleted-row' : ''}">
                <td style="color:#bbb;font-size:12px">${i+1}</td>
                <td>${r.work_date}${isDeleted ? '<span class="deleted-badge">삭제됨</span>' : ''}</td>
                <td style="font-weight:500">${r.worker_id||'-'}</td>
                <td style="font-size:12px;color:#555">${prod.partNo||'-'}</td>
                <td style="font-size:12px;color:#555">${prod.partName||'-'}</td>
                <td>${r.worker_name||'-'}</td>
                <td>${lots}</td>
                <td style="text-align:right;font-weight:500;color:#243bb2">${(r.inspect_qty||0).toLocaleString()}</td>
                <td class="pass-cell" style="text-align:right">${(r.pass_qty||0).toLocaleString()}</td>
                <td class="defect-cell" style="text-align:right">${(r.fail_qty||0).toLocaleString()}</td>
                <td style="font-size:12px">${r.defect_type||'-'}</td>
                <td style="font-size:12px;color:#888">${r.defect_memo||'-'}</td>
                <td style="font-size:12px;color:#888">${r.remarks||'-'}</td>
                <td style="font-size:11px;color:#888">${r.created_by_name||'-'}</td>
                <td style="font-size:11px;color:#aaa">${fmtDatetime(r.submitted_at)}</td>
                <td>${actionsHtml}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── 엑셀 다운로드 ──────────────────────────────
function downloadExcel() {
  const wb = XLSX.utils.book_new();
  let added = 0;

  // 포장 데이터
  if ((currentProcess === 'all' || currentProcess === '포장') && cachedData.포장.length > 0) {
    const rows = cachedData.포장.map((r, i) => {
      const prod = PRODUCTS[r.worker_id] || {};
      return {
        'NO': i + 1,
        '작업일': r.work_date || '',
        '사번': r.worker_id || '',
        '고객 품번': prod.partNo || '',
        '품명': prod.partName || '',
        '작업자': r.worker_name || '',
        '성형 LOT No.': (r.lot_nos || []).join(', '),
        '포장수량': r.quantity || 0,
        '비고': r.note || '',
        '특이사항': r.remarks || '',
        '제출일시': fmtDatetime(r.submitted_at)
      };
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:5},{wch:11},{wch:10},{wch:15},{wch:25},{wch:10},{wch:18},{wch:10},{wch:18},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws, '포장 작업일지');
    added++;
  }

  // 검사 데이터
  if ((currentProcess === 'all' || currentProcess === '검사') && cachedData.검사.length > 0) {
    const rows = cachedData.검사.map((r, i) => {
      const prod = PRODUCTS[r.worker_id] || {};
      return {
        'NO': i + 1,
        '작업일': r.work_date || '',
        '사번': r.worker_id || '',
        '고객 품번': prod.partNo || '',
        '품명': prod.partName || '',
        '작업자': r.worker_name || '',
        '성형 LOT No.': (r.lot_nos || []).join(', '),
        '검사수량': r.inspect_qty || 0,
        '합격수량': r.pass_qty || 0,
        '불합격수량': r.fail_qty || 0,
        '불량유형': r.defect_type || '',
        '불량 메모': r.defect_memo || '',
        '특이사항': r.remarks || '',
        '제출일시': fmtDatetime(r.submitted_at)
      };
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:5},{wch:11},{wch:10},{wch:15},{wch:25},{wch:10},{wch:18},{wch:9},{wch:9},{wch:9},{wch:12},{wch:18},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws, '검사 작업일지');
    added++;
  }

  if (added === 0) { showToast('다운로드할 데이터가 없어요.'); return; }

  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value;
  const procName = currentProcess === 'all' ? '전체' : currentProcess;
  XLSX.writeFile(wb, `${procName}_작업일지_${start}_${end}.xlsx`);
  showToast('엑셀 다운로드 완료 ✓');
}

// 초기화
window.onload = async () => {
  document.getElementById('startDate').value = firstDayOfMonth();
  document.getElementById('endDate').value = todayStr();
  await loadMyInfo();
  await loadProducts();
  loadData();
};
</script>
