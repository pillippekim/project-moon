<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기준정보 관리 - Project Moon</title>

<script src="auth_guard.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 1rem; }
.app { max-width: 900px; margin: 0 auto; }
.top-nav { display: flex; align-items: center; justify-content: space-between; background: white; padding: 16px 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(36,59,178,0.08); margin-bottom: 20px; }
.back-btn { background: #f0f3f9; color: #243bb2; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; font-family: inherit; }
.back-btn:hover { background: #e3e8f5; text-decoration: none; }
.nav-heading { font-size: 20px; font-weight: 700; color: #243bb2; }
.nav-sep { display: none; }
.nav-title { display: none; }
.card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1rem 1.25rem; margin-bottom: 1rem; }

/* 메인 탭 */
.main-tabs { display: flex; gap: 0; margin-bottom: 1rem; background: white; border-radius: 12px; border: 1px solid #e5e5e5; overflow: hidden; }
.main-tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 500; color: #888; border: none; background: transparent; font-family: inherit; transition: all 0.15s; border-bottom: 2.5px solid transparent; }
.main-tab:hover { color: #2563eb; background: #f9f9f9; }
.main-tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #eff6ff; }

/* 섹션 */
.section { display: none; }
.section.active { display: block; }

/* 카드 헤더 */
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.card-title { font-size: 15px; font-weight: 600; color: #111; }
.card-sub { font-size: 12px; color: #888; margin-top: 2px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* 검색바 */
.search-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-input { flex: 1; font-size: 13px; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 12px; outline: none; font-family: inherit; color: #111; }
.search-input:focus { border-color: #2563eb; }
.btn-search { font-size: 13px; padding: 8px 16px; border-radius: 8px; background: #2563eb; color: white; border: none; cursor: pointer; font-family: inherit; white-space: nowrap; }

/* 버튼 */
.btn-add { font-size: 13px; padding: 7px 16px; border-radius: 8px; background: #2563eb; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; }
.btn-excel { font-size: 13px; padding: 7px 14px; border-radius: 8px; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; cursor: pointer; font-family: inherit; }
.btn-template { font-size: 13px; padding: 7px 14px; border-radius: 8px; background: #f9f9f9; color: #555; border: 1px solid #e5e5e5; cursor: pointer; font-family: inherit; }

/* 업로드 섹션 */
.upload-section { background: #f9f9f9; border: 1.5px dashed #ddd; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: none; }
.upload-section.open { display: block; }
.excel-zone { border: 1.5px dashed #cbd5e1; border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; background: white; margin-bottom: 12px; transition: all 0.15s; }
.excel-zone:hover { border-color: #2563eb; background: #eff6ff; }
.excel-zone.dragover { border-color: #2563eb; background: #eff6ff; border-style: solid; }
.excel-preview { margin-bottom: 12px; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.preview-table th { background: #f9f9f9; padding: 6px 8px; border-bottom: 1px solid #eee; text-align: left; color: #888; ; position: sticky; top: 0; z-index: 10; }
.preview-table td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; }
.preview-count { font-size: 12px; color: #555; margin-bottom: 8px; }

/* 폼 */
.form-row { display: none; background: #f9f9f9; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #eee; }
.form-row.open { display: block; }
.form-grid { display: grid; gap: 10px; align-items: end; margin-bottom: 10px; }
.form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-grid-2 { grid-template-columns: 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; color: #888; }
.form-input, .form-select { font-size: 13px; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 10px; outline: none; font-family: inherit; color: #111; background: white; }
.form-input:focus, .form-select:focus { border-color: #2563eb; }
.form-actions { display: flex; justify-content: flex-end; gap: 8px; }
.btn-save { font-size: 13px; padding: 8px 18px; border-radius: 8px; background: #2563eb; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; }
.btn-cancel-form { font-size: 13px; padding: 8px 14px; border-radius: 8px; background: transparent; color: #888; border: 1px solid #ddd; cursor: pointer; font-family: inherit; }

/* 테이블 */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { font-size: 12px; font-weight: 500; color: #888; padding: 8px 12px; background: #f9f9f9; border-bottom: 1px solid #eee; text-align: left; position: sticky; top: 0; z-index: 10; }
td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #111; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }
.btn-del { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: transparent; color: #e53e3e; border: 1px solid #fca5a5; cursor: pointer; font-family: inherit; }
.btn-del:hover { background: #fff0f0; }
.btn-edit-sm { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: #f0fdf4; color: #16a34a; border: none; cursor: pointer; font-family: inherit; margin-right: 4px; }
.active-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.active-y { background: #f0fdf4; color: #16a34a; }
.active-n { background: #f9f9f9; color: #aaa; }
.empty-row td { text-align: center; color: #aaa; padding: 1.5rem; }

/* 더보기/접기 */
.show-more-row { text-align: center; padding: 10px; border-top: 1px solid #f0f0f0; }
.btn-show-more { font-size: 13px; color: #2563eb; background: none; border: none; cursor: pointer; font-family: inherit; padding: 4px 12px; }
.btn-show-more:hover { text-decoration: underline; }
.count-badge { display: inline-block; font-size: 11px; background: #f3f4f6; color: #555; border-radius: 10px; padding: 2px 8px; margin-left: 6px; }

/* 수정 모달 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: white; border-radius: 12px; padding: 1.5rem; width: 420px; }
.modal-title { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 1rem; }
.modal-grid { display: grid; gap: 10px; margin-bottom: 1rem; }
.modal-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.modal-input, .modal-select { width: 100%; font-size: 13px; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 10px; outline: none; font-family: inherit; color: #111; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-modal-cancel { font-size: 13px; padding: 9px 18px; border-radius: 8px; background: transparent; color: #888; border: 1px solid #ddd; cursor: pointer; font-family: inherit; }
.btn-modal-save { font-size: 13px; padding: 9px 18px; border-radius: 8px; background: #2563eb; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; }

.toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 999; white-space: nowrap; }
.toast.show { display: block; }

/* 테이블 헤더 고정 */
.table-scroll-wrap { max-height: 600px; overflow-y: auto; overflow-x: auto; border-radius: 8px; border: 1px solid #f0f0f0; }
.table-scroll-wrap table { margin: 0; }
.table-scroll-wrap thead th { position: sticky; top: 0; z-index: 10; background: #f9f9f9; box-shadow: inset 0 -1px 0 #eee; }

</style>
</head>

<script>
const SUPABASE_URL = 'https://vpaixxlhzkwtgcllimvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwYWl4eGxoemt3dGdjbGxpbXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzk4NjMsImV4cCI6MjA5MTk1NTg2M30.V8Bj0cMbM0E2TFhklYYa7TM-vO6Fi70ctACA7uUf4Ig';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PAGE_SIZE = 10;
let allProducts = [], allWorkers = [];
let showAllProduct = false, showAllWorker = false;
let excelData = [];

function fmtDate(str) { return str ? str.slice(0,10) : '-'; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 탭 전환
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('section_' + tab).classList.add('active');
  document.getElementById('tabBtn_' + tab).classList.add('active');
}

function toggleForm(type) {
  const el = document.getElementById('form_' + type);
  el.classList.toggle('open');
}

function toggleUpload(type) {
  const el = document.getElementById('uploadSection_' + type);
  el.classList.toggle('open');
}

// 더보기/접기
function toggleShowAll(type) {
  if (type === 'product') {
    showAllProduct = !showAllProduct;
    renderProducts(allProducts);
  } else {
    showAllWorker = !showAllWorker;
    renderWorkers(allWorkers);
  }
}

// ── 제품 ──────────────────────────────
async function loadProducts() {
  const { data } = await db.from('products').select('*').order('sabun');
  allProducts = data || [];
  renderProducts(allProducts);
}

function filterProducts() {
  const q = document.getElementById('searchProduct').value.trim().toLowerCase();
  const filtered = q
    ? allProducts.filter(r =>
        r.sabun.toLowerCase().includes(q) ||
        (r.part_name||'').toLowerCase().includes(q) ||
        (r.part_no||'').toLowerCase().includes(q))
    : allProducts;
  renderProducts(filtered, true);
}

function renderProducts(data, isSearch = false) {
  const tbody = document.getElementById('productTable');
  const moreRow = document.getElementById('productMoreRow');
  const moreBtn = document.getElementById('productMoreBtn');

  if (!data.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">등록된 제품이 없어요.</td></tr>';
    moreRow.style.display = 'none';
    return;
  }

  const showAll = isSearch || showAllProduct;
  const displayed = showAll ? data : data.slice(0, PAGE_SIZE);

  tbody.innerHTML = displayed.map(r => `
    <tr>
      <td style="font-weight:500">${r.sabun}</td>
      <td style="color:#555">${r.part_no || '-'}</td>
      <td>${r.part_name || '-'}</td>
      <td style="color:#aaa;font-size:12px">${fmtDate(r.created_at)}</td>
      <td style="white-space:nowrap">
        <button class="btn-edit-sm" onclick='openEditProduct(${JSON.stringify(r).replace(/"/g,"&quot;")})'>수정</button>
        <button class="btn-del" onclick="deleteProduct(${r.id})">삭제</button>
      </td>
    </tr>
  `).join('');

  if (!isSearch && data.length > PAGE_SIZE) {
    moreRow.style.display = 'block';
    moreBtn.textContent = showAllProduct
      ? `▲ 접기`
      : `▼ 더보기 (${data.length - PAGE_SIZE}건 더)`;
  } else {
    moreRow.style.display = 'none';
  }
}

async function saveProduct() {

  const partNo   = document.getElementById('p_partno').value.trim();

  document.getElementById('p_partno').value = '';
  document.getElementById('p_partname').value = '';

function openEditProduct(r) {

async function saveEditProduct() {

async function deleteProduct(id) {

// ── 작업자 ──────────────────────────────
async function loadWorkers() {
  const { data } = await db.from('workers').select('*').order('process').order('name');
  allWorkers = data || [];
  renderWorkers(allWorkers);
}

function filterWorkers() {
  const q = document.getElementById('searchWorker').value.trim().toLowerCase();
  const filtered = q
    ? allWorkers.filter(r =>
        r.name.toLowerCase().includes(q) ||
        (r.name_local || '').toLowerCase().includes(q) ||
        r.process.toLowerCase().includes(q))
    : allWorkers;
  renderWorkers(filtered, true);
}

function renderWorkers(data, isSearch = false) {
  const tbody = document.getElementById('workerTable');
  const moreRow = document.getElementById('workerMoreRow');
  const moreBtn = document.getElementById('workerMoreBtn');

  if (!data.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">등록된 작업자가 없어요.</td></tr>';
    moreRow.style.display = 'none';
    return;
  }

  const showAll = isSearch || showAllWorker;
  const displayed = showAll ? data : data.slice(0, PAGE_SIZE);

  tbody.innerHTML = displayed.map(r => `
    <tr>
      <td style="font-weight:500">${r.name}</td>
      <td style="font-size:12px;color:${r.name_local?'#555':'#ccc'}">${r.name_local || '-'}</td>
      <td>${r.process}</td>
      <td><span class="active-badge ${r.active ? 'active-y' : 'active-n'}">${r.active ? '재직중' : '퇴직'}</span></td>
      <td style="color:#aaa;font-size:12px">${fmtDate(r.created_at)}</td>
      <td style="display:flex;gap:4px">
        <button class="btn-edit-sm" onclick="toggleWorker(${r.id}, ${r.active})">${r.active ? '비활성화' : '활성화'}</button>
        <button class="btn-del" onclick="deleteWorker(${r.id})">삭제</button>
      </td>
    </tr>
  `).join('');

  if (!isSearch && data.length > PAGE_SIZE) {
    moreRow.style.display = 'block';
    moreBtn.textContent = showAllWorker
      ? `▲ 접기`
      : `▼ 더보기 (${data.length - PAGE_SIZE}건 더)`;
  } else {
    moreRow.style.display = 'none';
  }
}

async function saveWorker() {
  const name    = document.getElementById('w_name').value.trim();
  const nameLocal = document.getElementById('w_name_local').value.trim();
  const process = document.getElementById('w_process').value;
  if (!name) { showToast('이름을 입력해주세요.'); return; }
  const payload = { name, process };
  if (nameLocal) payload.name_local = nameLocal;
  const { error } = await db.from('workers').insert(payload);
  if (error) { showToast('저장 실패: ' + error.message); return; }
  document.getElementById('w_name').value = '';
  document.getElementById('w_name_local').value = '';
  toggleForm('worker');
  showToast('작업자가 추가됐어요 ✓');
  loadWorkers();
}

async function toggleWorker(id, current) {
  await db.from('workers').update({ active: !current }).eq('id', id);
  showToast(current ? '비활성화됐어요.' : '활성화됐어요.');
  loadWorkers();
}

async function deleteWorker(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await db.from('workers').delete().eq('id', id);
  showToast('삭제됐어요.');
  loadWorkers();
}

// ── 엑셀 업로드 ──────────────────────────────
function onExcelDragOver(e) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('excelZone').classList.add('dragover');
}
function onExcelDragLeaveSection(e) {
  if (!e.currentTarget.contains(e.relatedTarget))
    document.getElementById('excelZone').classList.remove('dragover');
}
function onExcelDrop(e) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('excelZone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (!file.name.match(/\.xlsx?$/i)) { showToast('엑셀 파일(.xlsx)만 가능해요.'); return; }
  onExcelSelect({ target: { files: [file] } });
}

function onExcelSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('excelSelected').textContent = '📊 ' + file.name;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const wb = XLSX.read(ev.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });

    // 헤더 행 자동 탐색
    let headerRow = -1;
    let colIdx = { sabun: -1, part_no: -1, part_name: -1, active: -1 };
    for (let i = 0; i < Math.min(raw.length, 10); i++) {
      const row = raw[i];
      if (!row) continue;
      const s = row.findIndex(v => String(v||'').trim() === '사번');
      const p = row.findIndex(v => String(v||'').trim() === '품번');
      const n = row.findIndex(v => String(v||'').trim() === '품목명');
      if (s >= 0 && p >= 0 && n >= 0) {
        headerRow = i;
        colIdx = { sabun: s, part_no: p, part_name: n,
          active: row.findIndex(v => String(v||'').trim() === '사용') };
        break;
      }
    }

    if (headerRow < 0) { showToast('헤더를 찾을 수 없어요.'); return; }

    excelData = [];
    for (let i = headerRow + 1; i < raw.length; i++) {
      const row = raw[i];
      if (!row || !row[colIdx.sabun]) continue;
      if (colIdx.active >= 0 && String(row[colIdx.active]||'').trim() !== 'YES') continue;
      excelData.push({
        sabun:     String(row[colIdx.sabun]    || '').trim(),
        part_no:   String(row[colIdx.part_no]  || '').trim(),
        part_name: String(row[colIdx.part_name]|| '').trim()
      });
    }

    // 사번 기준 중복 제거
    const seen = new Set();
    excelData = excelData.filter(r => { if (seen.has(r.sabun)) return false; seen.add(r.sabun); return true; });

    document.getElementById('previewCount').innerHTML =
      `총 <strong>${excelData.length}건</strong> 인식 완료 <span style="color:#aaa;font-size:11px">(사용중 + 중복제거 적용)</span>`;
    document.getElementById('previewBody').innerHTML =
      excelData.slice(0,8).map(r =>
        `<tr><td>${r.sabun}</td><td>${r.part_no}</td><td>${r.part_name}</td></tr>`
      ).join('') +
      (excelData.length > 8 ? `<tr><td colspan="3" style="color:#aaa;text-align:center;padding:6px">... 외 ${excelData.length-8}건</td></tr>` : '');
    document.getElementById('excelPreview').style.display = 'block';
    document.getElementById('excelUploadBtn').disabled = false;
  };
  reader.readAsBinaryString(file);
}

async function uploadExcel() {
  if (!excelData.length) return;
  const btn = document.getElementById('excelUploadBtn');
  btn.disabled = true; btn.textContent = '업로드 중...';
  let done = 0, fail = 0;
  // 청크 단위로 업로드 (100건씩)
  const chunkSize = 100;
  for (let i = 0; i < excelData.length; i += chunkSize) {
    const chunk = excelData.slice(i, i + chunkSize);
    const { error } = await db.from('products').upsert(chunk, { onConflict: 'sabun' });
    if (error) fail += chunk.length; else done += chunk.length;
  }
  showToast(`${done}건 업로드 완료${fail ? ', ' + fail + '건 실패' : ''} ✓`);
  btn.disabled = false; btn.textContent = '업로드';
  toggleUpload('product');
  document.getElementById('excelInput').value = '';
  document.getElementById('excelSelected').textContent = '';
  document.getElementById('excelPreview').style.display = 'none';
  excelData = [];
  loadProducts();
}

function downloadTemplate() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([
    ['사번', '고객품번', '품명'],
    ['502284', '9556086', 'BUSH-MTG D/LATCH PWR ACTR'],
  ]);
  ws['!cols'] = [{wch:12},{wch:20},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws, '제품기준정보');
  XLSX.writeFile(wb, '제품기준정보_양식.xlsx');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

loadProducts();
loadWorkers();
</script>
