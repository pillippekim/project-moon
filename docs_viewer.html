<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문서 조회 - Project Moon</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth_guard.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
.top-bar { background: white; border-bottom: 1px solid #e5e5e5; padding: 0 1.25rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 15px; font-weight: 700; color: #111; }
.logo span { color: #2563eb; }
.back-btn { font-size: 13px; color: #2563eb; background: none; border: none; cursor: pointer; font-family: inherit; }

/* 검색 화면 */
.search-screen { max-width: 480px; margin: 3rem auto 1rem; padding: 1rem; }
.search-card { background: white; border-radius: 16px; border: 1px solid #e5e5e5; padding: 2rem; text-align: center; }
.search-icon { font-size: 48px; margin-bottom: 1rem; }
.search-title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 6px; }
.search-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.search-input-wrap { display: flex; gap: 8px; margin-bottom: 10px; }
.search-input { flex: 1; font-size: 18px; font-weight: 500; border: 2px solid #e5e5e5; border-radius: 10px; padding: 12px 16px; outline: none; font-family: inherit; color: #111; text-align: center; letter-spacing: 2px; }
.search-input:focus { border-color: #2563eb; }
.search-btn { font-size: 14px; padding: 12px 20px; border-radius: 10px; background: #2563eb; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; }
.search-hint { font-size: 12px; color: #aaa; }

/* 결과 화면 */
.result-screen { display: none; max-width: 700px; margin: 0 auto; padding: 1rem; }
.product-info { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
.product-sabun { font-size: 22px; font-weight: 700; color: #111; }
.product-sub { font-size: 13px; color: #888; margin-top: 2px; }
.doc-count { font-size: 13px; color: #2563eb; background: #eff6ff; padding: 4px 12px; border-radius: 8px; }

.doc-section { margin-bottom: 1rem; }
.section-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.doc-card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1rem 1.25rem; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: border-color 0.15s; }
.doc-card:hover { border-color: #2563eb; }
.doc-card-left { display: flex; align-items: center; gap: 12px; }
.doc-icon { font-size: 28px; }
.doc-name { font-size: 15px; font-weight: 500; color: #111; margin-bottom: 3px; }
.doc-meta { font-size: 12px; color: #888; }
.doc-type-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-right: 6px; }
.type-검사기준서 { background: #eff6ff; color: #2563eb; }
.type-작업표준서 { background: #f0fdf4; color: #16a34a; }
.type-검사협정서 { background: #fff7ed; color: #ea580c; }
.type-관리계획서 { background: #fdf4ff; color: #9333ea; }
.type-외관검사기준서 { background: #fef9c3; color: #ca8a04; }
.version-tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 6px; background: #f3f4f6; color: #555; }
.btn-open { font-size: 13px; padding: 8px 18px; border-radius: 8px; background: #2563eb; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; }

.empty-docs { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 2rem; text-align: center; color: #aaa; font-size: 14px; }
.btn-back-search { font-size: 13px; padding: 8px 18px; border-radius: 8px; background: transparent; color: #2563eb; border: 1px solid #ddd; cursor: pointer; font-family: inherit; }

/* PDF 뷰어 - PDF.js */
.viewer-screen { display: none; position: fixed; inset: 0; background: #1a1a1a; z-index: 200; flex-direction: column; }
.viewer-bar { background: #2a2a2a; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.viewer-title { font-size: 14px; color: white; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.viewer-close { font-size: 13px; padding: 7px 16px; border-radius: 6px; background: transparent; color: #ccc; border: 1px solid #444; cursor: pointer; font-family: inherit; white-space: nowrap; }
.viewer-close:hover { color: white; border-color: #666; }

.viewer-controls { background: #2a2a2a; padding: 8px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-shrink: 0; border-top: 1px solid #1a1a1a; }
.ctrl-btn { font-size: 13px; padding: 6px 14px; border-radius: 6px; background: #3a3a3a; color: white; border: none; cursor: pointer; font-family: inherit; }
.ctrl-btn:hover:not(:disabled) { background: #4a4a4a; }
.ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.page-info { font-size: 13px; color: #ccc; min-width: 80px; text-align: center; }
.zoom-info { font-size: 12px; color: #aaa; min-width: 50px; text-align: center; }

.viewer-content { flex: 1; overflow: auto; background: #1a1a1a; padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.pdf-page-canvas { background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.4); max-width: 100%; height: auto; }

.pdf-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 3rem; color: #888; }
.pdf-loading-spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.pdf-loading-text { font-size: 13px; color: #aaa; }
.pdf-error { color: #fca5a5; font-size: 14px; padding: 2rem; text-align: center; }
</style>
</head>
<body>
<!-- 권한 체크 로딩 화면 -->
<div id="authCheckOverlay" style="position:fixed;inset:0;background:#f5f5f5;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
  <div style="width:36px;height:36px;border:3px solid #e5e5e5;border-top-color:#243bb2;border-radius:50%;animation:authSpin 0.8s linear infinite"></div>
  <div style="font-size:13px;color:#888;font-family:-apple-system,sans-serif">권한 확인 중...</div>
  <style>@keyframes authSpin { to { transform: rotate(360deg); } }</style>
</div>
<script>
(async function() {
  const user = await checkPageAccess('docs_viewer.html');
  if (!user) return; // 권한 없으면 함수 내부에서 화면 교체됨
  document.getElementById('authCheckOverlay').style.display = 'none';
})();
</script>


<div style="background:white;padding:16px 24px;border-radius:0 0 12px 12px;box-shadow:0 2px 8px rgba(36,59,178,0.08);display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
  <a href="index.html" style="background:#f0f3f9;color:#243bb2;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px">← 메인으로</a>
  <span style="font-size:20px;font-weight:700;color:#243bb2">🔍 문서 조회</span>
  <span style="font-size:13px;color:#666" id="userInfo">　</span>
</div>

<!-- 검색 화면 -->
<div class="search-screen" id="searchScreen">
  <div class="search-card">
    <div class="search-icon">🔍</div>
    <div class="search-title">문서 조회</div>
    <div class="search-sub">사번을 입력하면 해당 제품의<br>검사기준서 및 작업표준서를 확인할 수 있어요</div>
    <div class="search-input-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="사번 입력"
        maxlength="10" onkeydown="if(event.key==='Enter') searchDocs()" />
      <button class="search-btn" onclick="searchDocs()">조회</button>
    </div>
    <div class="search-hint">예: 502284 · 509040 · 502308</div>
  </div>
</div>

<!-- 결과 화면 -->
<div class="result-screen" id="resultScreen">
  <div class="product-info">
    <div>
      <div class="product-sabun" id="resultSabun"></div>
      <div class="product-sub" id="resultSub"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="doc-count" id="docCount"></span>
      <button class="btn-back-search" onclick="backToSearch()">다시 검색</button>
    </div>
  </div>
  <div id="docList"></div>
</div>

<!-- PDF 뷰어 -->
<div class="viewer-screen" id="viewerScreen">
  <div class="viewer-bar">
    <button class="viewer-close" onclick="closeViewer()">✕ 닫기</button>
    <div class="viewer-title" id="viewerTitle"></div>
    <span style="font-size:11px;color:#999;background:#1a1a1a;padding:3px 10px;border-radius:4px">📋 열람 전용</span>
  </div>
  <div class="viewer-content" id="viewerContent" oncontextmenu="return false">
    <div class="pdf-loading" id="pdfLoading">
      <div class="pdf-loading-spinner"></div>
      <div class="pdf-loading-text">문서 불러오는 중...</div>
    </div>
  </div>
  <div class="viewer-controls" id="viewerControls" style="display:none">
    <button class="ctrl-btn" onclick="prevPage()" id="prevBtn">◀ 이전</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button class="ctrl-btn" onclick="nextPage()" id="nextBtn">다음 ▶</button>
    <span style="color:#444;margin:0 8px">|</span>
    <button class="ctrl-btn" onclick="zoomOut()">－</button>
    <span class="zoom-info" id="zoomInfo">100%</span>
    <button class="ctrl-btn" onclick="zoomIn()">＋</button>
    <button class="ctrl-btn" onclick="fitWidth()">화면맞춤</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vpaixxlhzkwtgcllimvn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwYWl4eGxoemt3dGdjbGxpbXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzk4NjMsImV4cCI6MjA5MTk1NTg2M30.V8Bj0cMbM0E2TFhklYYa7TM-vO6Fi70ctACA7uUf4Ig';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// PDF.js worker 설정
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let PRODUCTS = {};

async function loadProducts() {
  const { data } = await db.from('products').select('sabun, part_no, part_name');
  if (data) {
    data.forEach(r => {
      PRODUCTS[r.sabun] = { partNo: r.part_no || '', partName: r.part_name || '' };
    });
  }
}

const DOC_ICONS = {
  '검사기준서': '📋', '외관검사기준서': '🖼️',
  '작업표준서': '📖', '검사협정서': '🤝', '관리계획서': '📊'
};

const DOC_ORDER = ['검사기준서','외관검사기준서','작업표준서','검사협정서','관리계획서'];

async function searchDocs() {
  const sabun = document.getElementById('searchInput').value.trim();
  if (!sabun) return;

  const { data } = await db.from('documents')
    .select('*')
    .eq('sabun', sabun)
    .eq('is_current', true)
    .order('doc_type');

  const prod = PRODUCTS[sabun] || {};
  document.getElementById('resultSabun').textContent = '사번 ' + sabun;
  document.getElementById('resultSub').textContent = prod.partNo
    ? prod.partNo + ' · ' + prod.partName
    : '등록된 제품 정보 없음';
  document.getElementById('docCount').textContent = (data ? data.length : 0) + '건의 문서';

  const listEl = document.getElementById('docList');

  if (!data || data.length === 0) {
    listEl.innerHTML = '<div class="empty-docs">등록된 문서가 없어요.<br>관리자에게 문의해주세요.</div>';
  } else {
    const grouped = {};
    DOC_ORDER.forEach(t => { grouped[t] = []; });
    data.forEach(d => {
      if (!grouped[d.doc_type]) grouped[d.doc_type] = [];
      grouped[d.doc_type].push(d);
    });

    listEl.innerHTML = DOC_ORDER.filter(t => grouped[t].length > 0).map(type => `
      <div class="doc-section">
        <div class="section-title">${type}</div>
        ${grouped[type].map(r => `
          <div class="doc-card" onclick="openViewer('${r.file_url}','${r.doc_name}','${r.doc_type}','${r.version}')">
            <div class="doc-card-left">
              <div class="doc-icon">${DOC_ICONS[r.doc_type] || '📄'}</div>
              <div>
                <div class="doc-name">${r.doc_name}</div>
                <div class="doc-meta">
                  <span class="doc-type-badge type-${r.doc_type}">${r.doc_type}</span>
                  <span class="version-tag">${r.version}</span>
                  <span style="margin-left:6px;color:#aaa">${fmtDate(r.created_at)} 등록</span>
                </div>
              </div>
            </div>
            <button class="btn-open" oncontextmenu="return false">열기 →</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  document.getElementById('searchScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
}

function backToSearch() {
  document.getElementById('searchScreen').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
}

// ── PDF.js 뷰어 ──────────────────────────────
let pdfDoc = null;
let currentPage = 1;
let totalPages = 1;
let currentScale = 1.5;

async function openViewer(url, name, type, version) {
  // 1. 뷰어 즉시 표시
  document.getElementById('viewerTitle').textContent = name + ' · ' + version;
  document.getElementById('viewerScreen').style.display = 'flex';
  document.getElementById('viewerContent').innerHTML = `
    <div class="pdf-loading">
      <div class="pdf-loading-spinner"></div>
      <div class="pdf-loading-text">문서 불러오는 중...</div>
    </div>
  `;
  document.getElementById('viewerControls').style.display = 'none';

  try {
    // 2. PDF.js로 PDF 로드
    const loadingTask = pdfjsLib.getDocument(url);
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;

    // 3. 첫 페이지 렌더링 + 컨트롤 표시
    document.getElementById('viewerContent').innerHTML = '';
    document.getElementById('viewerControls').style.display = 'flex';
    await renderPage(1);
  } catch (err) {
    document.getElementById('viewerContent').innerHTML = `
      <div class="pdf-error">
        ⚠️ 문서를 불러올 수 없어요.<br>
        <span style="font-size:12px;color:#888;margin-top:8px;display:block">
          ${err.message || ''}
        </span>
      </div>
    `;
  }
}

async function renderPage(num) {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: currentScale });

  const canvas = document.createElement('canvas');
  canvas.className = 'pdf-page-canvas';
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');

  // 기존 캔버스 제거
  document.getElementById('viewerContent').innerHTML = '';
  document.getElementById('viewerContent').appendChild(canvas);

  await page.render({ canvasContext: ctx, viewport }).promise;

  // 페이지 정보 업데이트
  document.getElementById('pageInfo').textContent = num + ' / ' + totalPages;
  document.getElementById('prevBtn').disabled = (num <= 1);
  document.getElementById('nextBtn').disabled = (num >= totalPages);
  document.getElementById('zoomInfo').textContent = Math.round(currentScale * 100 / 1.5 * 100) / 100 + '%';
}

function prevPage() {
  if (currentPage <= 1) return;
  currentPage--;
  renderPage(currentPage);
  scrollViewerToTop();
}

function nextPage() {
  if (currentPage >= totalPages) return;
  currentPage++;
  renderPage(currentPage);
  scrollViewerToTop();
}

function zoomIn() {
  currentScale = Math.min(currentScale + 0.3, 4);
  renderPage(currentPage);
}

function zoomOut() {
  currentScale = Math.max(currentScale - 0.3, 0.5);
  renderPage(currentPage);
}

function fitWidth() {
  // 컨테이너 너비에 맞게 스케일 자동 조정
  if (!pdfDoc) return;
  pdfDoc.getPage(currentPage).then(page => {
    const containerWidth = document.getElementById('viewerContent').clientWidth - 32;
    const viewport = page.getViewport({ scale: 1 });
    currentScale = containerWidth / viewport.width;
    renderPage(currentPage);
  });
}

function scrollViewerToTop() {
  document.getElementById('viewerContent').scrollTop = 0;
}

function closeViewer() {
  document.getElementById('viewerScreen').style.display = 'none';
  document.getElementById('viewerContent').innerHTML = '';
  pdfDoc = null;
}

function goHome() { location.href = 'index.html'; }
function fmtDate(str) { return str ? str.slice(0,10) : ''; }

loadProducts();
</script>
</body>
</html>
